<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">公開1枚ドロー</title>
  <desc id="desc">山札から上へ引き出された一枚のカードと目の記号で、カードを公開して一枚引くことを表すアイコン</desc>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- deck -->
    <path d="M57 105h132a10 10 0 0 1 10 10v101H67a10 10 0 0 1-10-10Z"
          stroke="var(--icon-primary, #F4F7FB)" stroke-width="10" opacity=".30"/>
    <path d="M45 91h132a10 10 0 0 1 10 10v103H55a10 10 0 0 1-10-10Z"
          stroke="var(--icon-primary, #F4F7FB)" stroke-width="10" opacity=".55"/>

    <!-- revealed card rising from the deck -->
    <rect x="34" y="25" width="142" height="142" rx="11"
          fill="var(--icon-badge, #16202D)" fill-opacity=".96"
          stroke="var(--icon-primary, #F4F7FB)" stroke-width="10"/>

    <!-- public / visible -->
    <path d="M52 96c16-25 37-37 53-37s37 12 53 37c-16 25-37 37-53 37S68 121 52 96Z"
          stroke="var(--icon-accent, #E6B94F)" stroke-width="8"/>
    <circle cx="105" cy="96" r="16"
            stroke="var(--icon-accent, #E6B94F)" stroke-width="8"/>
    <circle cx="105" cy="96" r="5" fill="var(--icon-accent, #E6B94F)" stroke="none"/>

    <!-- draw direction -->
    <path d="M210 177V76" stroke="var(--icon-primary, #F4F7FB)" stroke-width="11"/>
    <path d="m188 99 22-23 22 23" stroke="var(--icon-primary, #F4F7FB)" stroke-width="11"/>

    <!-- one-card badge -->
    <circle cx="205" cy="196" r="35"
            fill="var(--icon-badge, #16202D)"
            stroke="var(--icon-primary, #F4F7FB)" stroke-width="8"/>
    <path d="m196 185 10-7v35M194 214h25"
          stroke="var(--icon-accent, #E6B94F)" stroke-width="8"/>
  </g>
</svg>
