<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- maximum-scale=1.0 + user-scalable=no でブラウザ標準のピンチズーム（ページ全体が
     拡縮され、固定配置のアイコン類まで一緒に動いてしまう）を無効化する。代わりに
     src/main.js の initCameraControls() が盤面(.scene)だけを対象にした独自の
     ピンチズームを実装している（タブレットでの誤操作報告を受けての対応）。 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- iOS Safariは、標準のtouch-action CSSやviewport metaのuser-scalable=noとは別の、
     独自のgesturestart/gesturechange/gestureendイベント（2本指ピンチの開始を知らせる、
     Web標準には無いApple独自API）経由でもネイティブのページ全体ピンチズームを
     トリガーすることがある（ユーザー報告: touch-actionだけの対策だとゲーム画面に来て
     最初の1回目のピンチだけネイティブズームになってしまっていた——一度でも他の操作で
     ページに触れた後は正しく独自のピンチズーム実装(src/main.js)が効くことから、
     「一番最初の2本指タッチだけ」ネイティブのジェスチャー認識に先を越されていたと
     判断した）。他のどのスクリプトより先に、確実にページ最初のタッチより前に登録
     しておく必要があるため、モジュール読み込みを待たずここでインラインに登録する。 -->
<script>
  document.addEventListener("gesturestart", (e) => e.preventDefault());
  document.addEventListener("gesturechange", (e) => e.preventDefault());
  document.addEventListener("gestureend", (e) => e.preventDefault());
</script>
<title>7 SHADES OF S:EVEN デジタル版</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- オンライン対戦（第一弾）用。姉妹プロジェクトと同じCDN UMD版・同じSupabaseプロジェクトに
     相乗りする（詳細はsupabase_setup_so7.sql参照）。 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<!-- 戦績管理システム連携（勝利時の証拠画像）は、以前はhtml2canvas系ライブラリで
     盤面(#scene)を直接スクリーンショットしていたが、この盤面が多用する3D変形・
     color-mix()をどうしても正しく再現できなかった（詳細はsrc/victory-summary-image.js
     参照）。今はDOM解析ライブラリを使わず、Canvas 2D APIで直接サマリー画像を
     自作する方式に切り替えたため、html2canvas(-pro)のCDN読み込みは不要になった。 -->
<link rel="stylesheet" href="src/style.css">
</head>
<body class="bg-black text-white">
  <div id="scene" class="scene">
    <div id="game-table" class="game-table"></div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
