<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- maximum-scale=1.0 + user-scalable=no でブラウザ標準のピンチズーム（ページ全体が
     拡縮され、固定配置のアイコン類まで一緒に動いてしまう）を無効化する。代わりに
     src/main.js の initCameraControls() が盤面(.scene)だけを対象にした独自の
     ピンチズームを実装している（タブレットでの誤操作報告を受けての対応）。 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>7 SHADES OF S:EVEN デジタル版</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- オンライン対戦（第一弾）用。姉妹プロジェクトと同じCDN UMD版・同じSupabaseプロジェクトに
     相乗りする（詳細はsupabase_setup_so7.sql参照）。 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="src/style.css">
</head>
<body class="bg-black text-white overflow-hidden">
  <div id="scene" class="scene">
    <div id="game-table" class="game-table"></div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
